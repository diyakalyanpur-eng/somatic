steps:
  # 1. Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - --no-cache
      - -t
      - gcr.io/$PROJECT_ID/aisteth:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/aisteth:latest
      - .

  # 2. Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/aisteth

  # 3. Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - aisteth
      - --image=gcr.io/$PROJECT_ID/aisteth:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --timeout=60
      # Non-secret env vars set inline
      - --set-env-vars=USE_FIRESTORE=true,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,FIRESTORE_DATABASE=aistethf3,CORS_ORIGINS=*
      # Secrets pulled from Secret Manager at runtime (create these first — see README)
      - --set-secrets=MISTRAL_KEY=aisteth-mistral-key:latest,API_KEY=aisteth-api-key:latest

images:
  - gcr.io/$PROJECT_ID/aisteth:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/aisteth:latest

options:
  logging: CLOUD_LOGGING_ONLY
