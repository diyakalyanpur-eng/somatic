steps:
  # 1. Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - --no-cache
      - -t
      - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/somatic:$COMMIT_SHA
      - -t
      - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/somatic:latest
      - .

  # 2. Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - --all-tags
      - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/somatic

  # 3. Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - somatic
      - --image=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/somatic:$COMMIT_SHA
      - --region=europe-west1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --timeout=60
      - --set-env-vars=USE_FIRESTORE=true,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,FIRESTORE_DATABASE=aistethf3,CORS_ORIGINS=*
      - --set-secrets=MISTRAL_KEY=aisteth-mistral-key:latest,API_KEY=aisteth-api-key:latest

images:
  - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/somatic:$COMMIT_SHA
  - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/somatic:latest

options:
  logging: CLOUD_LOGGING_ONLY
